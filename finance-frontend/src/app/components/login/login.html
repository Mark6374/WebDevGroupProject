<div class="auth-page">
  <div class="auth-glow"></div>

  <div class="auth-center">
    <div class="auth-title">WaLLeT</div>
    <div class="auth-sub">Finances + Crypto in one place</div>

    <div class="auth-card">
      <h2>Welcome</h2>

      <div *ngIf="errorMessage" class="auth-error">{{ errorMessage }}</div>

      <div class="auth-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" [(ngModel)]="username" placeholder="username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="password" placeholder="••••••••" autocomplete="current-password" (keyup.enter)="onSubmit()" />
        </div>
        <button (click)="onSubmit()" class="btn btn-acc btn-full">Login</button>
      </div>

      <p class="auth-link">
        Don't have an account? <a (click)="goToRegister()">Register</a>
      </p>
    </div>
  </div>
</div>
