<div class="login-container">
  <div class="login-card">
    <h2>Login</h2>
    <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
    
    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" placeholder="Enter username" class="form-control">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter password" class="form-control">
    </div>

    <button (click)="onSubmit()" class="btn-login">Login</button>
    <p class="register-link">
      Don't have an account? <a (click)="goToRegister()">Register</a>
    </p>
  </div>
</div>
