<div class="register-container">
  <div class="register-card">
    <h2>Register</h2>
    <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="success" *ngIf="successMessage">{{ successMessage }}</div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" placeholder="Choose username" class="form-control">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter email" class="form-control">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Create password" class="form-control">
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm password" class="form-control">
    </div>

    <button (click)="onSubmit()" class="btn-register">Register</button>
    <p class="login-link">
      Already have an account? <a (click)="goToLogin()">Login</a>
    </p>
  </div>
</div>
