<div class="auth-page">
  <div class="auth-glow"></div>

  <div class="auth-center">
    <div class="auth-title">FinVault</div>
    <div class="auth-sub">Create your account for free</div>

    <div class="auth-card">
      <h2>Register</h2>

      <div *ngIf="errorMessage"   class="auth-error">{{ errorMessage }}</div>
      <div *ngIf="successMessage" class="auth-success">{{ successMessage }}</div>

      <div class="auth-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" [(ngModel)]="username" placeholder="username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="email" placeholder="email@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="password" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" [(ngModel)]="confirmPassword" placeholder="••••••••" autocomplete="new-password" (keyup.enter)="onSubmit()" />
        </div>
        <button (click)="onSubmit()" class="btn btn-purple btn-full">Create Account</button>
      </div>

      <p class="auth-link">Already have an account? <a (click)="goToLogin()">Login</a>
      </p>
    </div>
  </div>
</div>
